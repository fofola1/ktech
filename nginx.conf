worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
	worker_connections 1024;
}

http {
	include /etc/nginx/mime.types;
	default_type application/octet-stream;
	server_tokens off;
	sendfile on;
	tcp_nopush on;
	keepalive_timeout 65;
	client_max_body_size 1m;

	map $cookie_ktech_client_id $client_rate_key {
		default $cookie_ktech_client_id;
		"" $request_id;
	}

	map $cookie_ktech_client_id $client_cookie_header {
		default "";
			"" "ktech_client_id=$request_id; Path=/; Max-Age=31536000; SameSite=Lax; HttpOnly";
	}

	limit_req_zone $client_rate_key zone=client_rate_limit:10m rate=5r/s;

	server {
		listen 80;
		server_name _;
		root /usr/share/nginx/html;
		index index.html;

		add_header X-Content-Type-Options nosniff always;
		add_header X-Frame-Options DENY always;
		add_header Referrer-Policy strict-origin-when-cross-origin always;
		add_header Set-Cookie $client_cookie_header always;
		limit_req zone=client_rate_limit burst=20 nodelay;

		location = /index.html {
			add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
		}

		location ~* \.css$ {
			add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
		}

		location ~* \.(?!html?$|css$)[a-z0-9]+$ {
			expires 30d;
			add_header Cache-Control "public, max-age=2592000, immutable" always;
		}

		location / {
			try_files $uri $uri/ /index.html;
		}
	}
}